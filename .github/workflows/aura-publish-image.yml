name: aura-publish-image

# Publishes the Aura WhatsApp sidecar image (whatsmeow bridge + FastMCP HTTP front)
# to GHCR. Uses the Actions GITHUB_TOKEN (packages:write), so no local PAT is needed.
# Trigger manually (Actions tab → Run workflow) or on changes to the build inputs.

on:
  workflow_dispatch:
  push:
    branches: [aura/cockpit-connect]
    paths:
      - 'whatsapp-bridge/**'
      - 'whatsapp-mcp-server/**'
      - 'Dockerfile'
      - 'docker/entrypoint.sh'
      - '.github/workflows/aura-publish-image.yml'

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:sidecar
            ghcr.io/${{ github.repository }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
